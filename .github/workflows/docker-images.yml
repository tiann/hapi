name: Docker Images

on:
  pull_request:
    paths:
      - 'Dockerfile.*'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.env.example'
      - '.github/workflows/docker-images.yml'
      - 'package.json'
      - 'bun.lock'
      - 'cli/**'
      - 'hub/**'
      - 'shared/**'
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'Dockerfile.*'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.env.example'
      - '.github/workflows/docker-images.yml'
      - 'package.json'
      - 'bun.lock'
      - 'cli/**'
      - 'hub/**'
      - 'shared/**'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: hub
            dockerfile: Dockerfile.hub
            image: ghcr.io/${{ github.repository_owner }}/zs-hub
          - name: runner
            dockerfile: Dockerfile.runner
            image: ghcr.io/${{ github.repository_owner }}/zs-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Lockfile precheck (frozen)
        run: |
          bun install --frozen-lockfile
          git diff --exit-code bun.lock

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and (optionally) push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Runner smoke test
        if: matrix.name == 'runner'
        run: |
          docker build -f Dockerfile.runner -t zs-runner:smoke .
          docker run --rm zs-runner:smoke zs --help
          docker run --rm zs-runner:smoke claude --version
          docker run --rm --entrypoint /bin/bash zs-runner:smoke -lc 'bun run --cwd /app/cli src/index.ts --help >/tmp/zs-help.txt && tail -n 20 /tmp/zs-help.txt'

  compose-smoke:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create smoke env
        run: |
          cp .env.example .env
          python3 - <<'PY'
          from pathlib import Path
          p = Path('.env')
          text = p.read_text()
          text = text.replace('CLI_API_TOKEN=change-me', 'CLI_API_TOKEN=smoke-test-token')
          text = text.replace('CLAUDE_CONFIG_DIR=/absolute/path/to/your/.claude', f'CLAUDE_CONFIG_DIR={Path.cwd() / ".claude"}')
          p.write_text(text)
          PY
          mkdir -p .claude

      - name: Validate env
        run: bun run docker:check

      - name: Compose smoke test
        run: |
          docker compose up -d --build zs-hub zs-runner
          for i in $(seq 1 30); do
            hub_status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' docker-zs-hub-1)
            runner_status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' docker-zs-runner-1)
            if [ "$hub_status" = 'healthy' ] && [ "$runner_status" = 'healthy' ]; then
              break
            fi
            sleep 2
          done
          docker compose ps
          docker inspect --format='hub={{.State.Health.Status}}' docker-zs-hub-1
          docker inspect --format='runner={{.State.Health.Status}} restart_count={{.RestartCount}} restarting={{.State.Restarting}} exit_code={{.State.ExitCode}}' docker-zs-runner-1
          docker compose logs --no-color --tail=120 zs-hub zs-runner
          test "$(docker inspect --format='{{.State.Health.Status}}' docker-zs-hub-1)" = 'healthy'
          test "$(docker inspect --format='{{.State.Health.Status}}' docker-zs-runner-1)" = 'healthy'
          test "$(docker inspect --format='{{.RestartCount}}' docker-zs-runner-1)" = '0'
          test "$(docker inspect --format='{{.State.Restarting}}' docker-zs-runner-1)" = 'false'

      - name: Teardown compose stack
        if: always()
        run: docker compose down -v
