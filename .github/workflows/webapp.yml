name: Deploy Web App to GitHub Pages

on:
    push:
        branches:
            - main
        paths:
            - 'bun.lock'
            - 'package.json'
            - 'cli/package.json'
            - 'shared/package.json'
            - 'shared/src/**'
            - 'hub/package.json'
            - 'web/**'
            - 'web/package.json'
            - 'website/package.json'
            - 'docs/package.json'
            - 'tools/hapi-codex-sync/package.json'
            - 'tools/hapi-codex-sync/package-lock.json'
            - 'scripts/dependency-security/**'
            - 'security/dependencies/**'
            - '.github/workflows/webapp.yml'
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.3.11'
            - run: bun install --frozen-lockfile
            - name: Gate dependency security policy
              run: bun run dependency:security -- --out "$RUNNER_TEMP/dependency-security" --as-of "$(date -u +%F)"
            - name: Build web app
              env:
                  VITE_REQUIRE_HUB_URL: '1'
              run: bun run --cwd web build
            - name: Add CNAME for custom domain
              run: echo "app.hapi.run" > web/dist/CNAME
            - name: Setup Pages
              uses: actions/configure-pages@v5
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: web/dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
