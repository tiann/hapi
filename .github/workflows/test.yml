name: Test

on:
    push:
        branches:
            - '**'
    pull_request:
    workflow_call:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.3.11'
            - run: bun install --frozen-lockfile
            - name: Gate dependency security policy
              run: bun run dependency:security -- --out "$RUNNER_TEMP/dependency-security" --as-of "$(date -u +%F)"
            - run: bun typecheck
            - name: Run controlled Runner integration suite
              shell: bash
              run: |
                  set -euo pipefail
                  umask 077
                  ROOT="$(mktemp -d "$RUNNER_TEMP/hapi-runner-integration.XXXXXX")"
                  HUB_HOME="$ROOT/hub"
                  CLI_HOME="$ROOT/cli"
                  HUB_LOG="$ROOT/hub.log"
                  TEST_LOG="$ROOT/runner-integration.log"
                  CLEANUP_PROBE_LOG="$ROOT/cleanup-probe.log"
                  EVENT_FILE="$CLI_HOME/fixture-events.jsonl"
                  LEDGER_FILE="$CLI_HOME/fixture-process-ledger.jsonl"
                  HUB_DB="$HUB_HOME/hapi.db"
                  TOKEN="ci-runner-integration-token-20260714"
                  PORT="31006"
                  mkdir -m 700 "$HUB_HOME" "$CLI_HOME"
                  touch "$EVENT_FILE" "$LEDGER_FILE"
                  chmod 600 "$EVENT_FILE" "$LEDGER_FILE"

                  HUB_PID=""
                  CLEANUP_PROBE_PID=""
                  source cli/scripts/runner-integration-exit.sh
                  cleanup() {
                      local prior_status=$?
                      local fixture_cleanup_status=0
                      set +e
                      env \
                          NODE_ENV=test \
                          HAPI_RUNNER_INTEGRATION=1 \
                          HAPI_RUNNER_INTEGRATION_FIXTURE=1 \
                          HAPI_RUNNER_INTEGRATION_CLEANUP_HELPER=1 \
                          HAPI_RUNNER_INTEGRATION_ROOT="$ROOT" \
                          HAPI_HOME="$CLI_HOME" \
                          HAPI_RUNNER_INTEGRATION_EVENT_FILE="$EVENT_FILE" \
                          HAPI_RUNNER_INTEGRATION_LEDGER_FILE="$LEDGER_FILE" \
                          HAPI_RUNNER_INTEGRATION_HUB_DB_PATH="$HUB_DB" \
                          HAPI_RUNNER_INTEGRATION_EXPECT_TERM_KILL_PID="$CLEANUP_PROBE_PID" \
                          HAPI_API_URL="http://127.0.0.1:$PORT" \
                          CLI_API_TOKEN="$TOKEN" \
                          bun cli/src/runner/fixtures/cleanupIntegrationAgents.ts "$LEDGER_FILE" \
                          || fixture_cleanup_status=$?
                      if [[ -n "$HUB_PID" ]] && kill -0 "$HUB_PID" 2>/dev/null; then
                          kill -TERM "$HUB_PID" 2>/dev/null || true
                          wait "$HUB_PID" 2>/dev/null || true
                      fi
                      hapi_runner_integration_exit "$prior_status" "$fixture_cleanup_status"
                  }
                  trap cleanup EXIT

                  env \
                      NODE_ENV=test \
                      HAPI_HOME="$HUB_HOME" \
                      DB_PATH="$HUB_DB" \
                      HAPI_LISTEN_HOST=127.0.0.1 \
                      HAPI_LISTEN_PORT="$PORT" \
                      CLI_API_TOKEN="$TOKEN" \
                      TELEGRAM_NOTIFICATION=false \
                      bun hub/src/index.ts --no-relay >"$HUB_LOG" 2>&1 &
                  HUB_PID=$!

                  for _ in $(seq 1 150); do
                      if curl -fsS "http://127.0.0.1:$PORT/health" >/dev/null; then
                          break
                      fi
                      if ! kill -0 "$HUB_PID" 2>/dev/null; then
                          cat "$HUB_LOG"
                          exit 1
                      fi
                      sleep 0.1
                  done
                  curl -fsS "http://127.0.0.1:$PORT/health" >/dev/null

                  env \
                      CI=1 \
                      NO_COLOR=1 \
                      NODE_ENV=test \
                      HAPI_HOME="$CLI_HOME" \
                      HAPI_RUNNER_INTEGRATION_ROOT="$ROOT" \
                      HAPI_RUNNER_INTEGRATION_HUB_DB_PATH="$HUB_DB" \
                      HAPI_API_URL="http://127.0.0.1:$PORT" \
                      CLI_API_TOKEN="$TOKEN" \
                      HAPI_RUNNER_INTEGRATION_FIXTURE=1 \
                      HAPI_RUNNER_INTEGRATION_EVENT_FILE="$EVENT_FILE" \
                      HAPI_RUNNER_INTEGRATION_LEDGER_FILE="$LEDGER_FILE" \
                      bun run --cwd cli test:runner-integration 2>&1 | tee "$TEST_LOG"

                  bash cli/scripts/validate-runner-integration-summary.sh "$TEST_LOG"

                  PROBE_NONCE="cleanup-probe-${GITHUB_RUN_ID:-local}-$RANDOM"
                  PROBE_RUNNER="cleanup-runner-${GITHUB_RUN_ATTEMPT:-0}-$RANDOM"
                  env \
                      NODE_ENV=test \
                      HAPI_RUNNER_INTEGRATION=1 \
                      HAPI_RUNNER_INTEGRATION_FIXTURE=1 \
                      HAPI_RUNNER_INTEGRATION_CLEANUP_PROBE=1 \
                      HAPI_RUNNER_INTEGRATION_ROOT="$ROOT" \
                      HAPI_HOME="$CLI_HOME" \
                      HAPI_RUNNER_INTEGRATION_EVENT_FILE="$EVENT_FILE" \
                      HAPI_RUNNER_INTEGRATION_LEDGER_FILE="$LEDGER_FILE" \
                      HAPI_RUNNER_INTEGRATION_HUB_DB_PATH="$HUB_DB" \
                      HAPI_API_URL="http://127.0.0.1:$PORT" \
                      CLI_API_TOKEN="$TOKEN" \
                      bun cli/src/runner/fixtures/cleanupIntegrationProbe.ts \
                          --hapi-launch-nonce "$PROBE_NONCE" \
                          --hapi-runner-instance "$PROBE_RUNNER" \
                          >"$CLEANUP_PROBE_LOG" 2>&1 &
                  CLEANUP_PROBE_PID=$!
                  for _ in $(seq 1 100); do
                      if grep -Fq "\"pid\":$CLEANUP_PROBE_PID" "$LEDGER_FILE"; then
                          break
                      fi
                      if ! kill -0 "$CLEANUP_PROBE_PID" 2>/dev/null; then
                          cat "$CLEANUP_PROBE_LOG"
                          exit 1
                      fi
                      sleep 0.05
                  done
                  grep -Fq "\"pid\":$CLEANUP_PROBE_PID" "$LEDGER_FILE" || {
                      cat "$CLEANUP_PROBE_LOG"
                      exit 1
                  }
            - run: bun run test
            - name: Build all workspaces from the committed closure
              run: bun run build
            - name: Install Playwright Chromium
              working-directory: web
              run: ./node_modules/.bin/playwright install --with-deps chromium
            - name: Gate tool-dense message history and authenticated cache isolation
              working-directory: web
              run: ./node_modules/.bin/playwright test --config playwright.config.ts e2e/message-window.spec.ts e2e/service-worker-cache.spec.ts --project=chromium
