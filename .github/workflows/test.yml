name: Test

on:
    push:
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14
            - uses: dtolnay/rust-toolchain@stable
            - run: bun install
            - run: bun typecheck
            - run: bun run native:test
            - name: Create integration test env
              run: |
                  {
                      echo "HAPI_HOME=~/.hapi-dev-test"
                      echo "HAPI_API_URL=http://localhost:3006"
                      echo "CLI_API_TOKEN=${CLI_API_TOKEN:-dev-test-token}"
                      echo "HAPI_DAEMON_HTTP_TIMEOUT=60000"
                      echo "HAPI_DAEMON_HEARTBEAT_INTERVAL=30000"
                  } > cli/.env.integration-test
            - run: bun run test
            - name: Build host single-exe native helper smoke
              run: |
                  set -euo pipefail
                  tmp="$(mktemp -d)"
                  bun run download:tunwg
                  cd cli
                  bun run scripts/build-executable.ts --outdir "$tmp" --name hapi-smoke
                  test -x "$tmp/bun-linux-x64-baseline/hapi-local"
                  "$tmp/bun-linux-x64-baseline/hapi-smoke" --version
