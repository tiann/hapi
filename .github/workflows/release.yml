name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: read

jobs:
    test:
        uses: ./.github/workflows/test.yml
        permissions:
            contents: read

    release:
        needs: test
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.3.11'
            - run: bun install --frozen-lockfile
            - name: Gate dependency security policy
              run: bun run dependency:security -- --out "$RUNNER_TEMP/dependency-security" --as-of "$(date -u +%F)"
            - name: Generate dependency SBOMs
              run: bun run dependency:sbom -- --out "$RUNNER_TEMP/dependency-security" --git-sha "$GITHUB_SHA"
            - run: bun run build:single-exe:all
            - name: Package release artifacts
              run: |
                  cd cli/dist-exe
                  mkdir -p ../release-artifacts
                  cp "$RUNNER_TEMP/dependency-security/hapi.cdx.json" ../release-artifacts/
                  cp "$RUNNER_TEMP/dependency-security/hapi-codex-sync.cdx.json" ../release-artifacts/
                  cp "$RUNNER_TEMP/dependency-security/hapi-sbom-manifest.json" ../release-artifacts/
                  cp "$RUNNER_TEMP/dependency-security/dependency-audit-summary.json" ../release-artifacts/

                  for dir in bun-*/; do
                      target="${dir%/}"
                      # bun-darwin-arm64 -> hapi-darwin-arm64
                      name="hapi-${target#bun-}"
                      name="${name/windows/win32}"

                      if [[ "$target" == *"windows"* ]]; then
                          zip -j "../release-artifacts/${name}.zip" "$target"/hapi.exe
                      else
                          tar -czvf "../release-artifacts/${name}.tar.gz" -C "$target" hapi
                      fi
                  done

                  cd ../release-artifacts
                  sha256sum * > checksums.txt
            - name: Create Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${GITHUB_REF#refs/tags/}" \
                      --title "Release ${GITHUB_REF#refs/tags/}" \
                      --generate-notes \
                      cli/release-artifacts/*
            - name: Update Homebrew formula
              continue-on-error: true
              env:
                  GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
              run: |
                  VERSION="${GITHUB_REF#refs/tags/v}"
                  cd cli && bun run update-homebrew-formula --version "$VERSION" --push
